name: generate duck pool

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install deps
        run: pip install requests

      - name: generate svg
        run: python scripts/generate_duck.py

      - name: commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions"
          git add duck.svg
          git commit -m "update duck pool" || exit 0
          git push
